<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Almacén</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        button.delete-btn { background-color: #dc3545; padding: 5px 10px; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h2>Gestión de Inventario de Almacén</h2>

    <div class="form-group">
        <label for="producto">Nombre del Producto:</label>
        <input type="text" id="producto" placeholder="Ej. Cajas de cartón">
    </div>
    <div class="form-group">
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" placeholder="0">
    </div>
    <button onclick="agregarProducto()">Agregar al Inventario</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-inventario">
            <!-- El contenido se genera dinámicamente -->
        </tbody>
    </table>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventarioAlmacen')) || [];
        let idCounter = inventario.length > 0 ? Math.max(...inventario.map(p => p.id)) + 1 : 1;

        actualizarTabla();

        function agregarProducto() {
            const nombre = document.getElementById('producto').value;
            const cantidad = document.getElementById('cantidad').value;

            if (nombre.trim() === '' || cantidad === '') {
                alert('Por favor, ingresa un nombre y una cantidad válida.');
                return;
            }

            const nuevoProducto = {
                id: idCounter++,
                nombre: nombre,
                cantidad: parseInt(cantidad)
            };

            inventario.push(nuevoProducto);
            guardarYActualizar();
            
            document.getElementById('producto').value = '';
            document.getElementById('cantidad').value = '';
        }

        function eliminarProducto(id) {
            inventario = inventario.filter(producto => producto.id !== id);
            guardarYActualizar();
        }

        function guardarYActualizar() {
            localStorage.setItem('inventarioAlmacen', JSON.stringify(inventario));
            actualizarTabla();
        }

        function actualizarTabla() {
            const tbody = document.getElementById('tabla-inventario');
            tbody.innerHTML = '';

            inventario.forEach(producto => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${producto.id}</td>
                    <td>${producto.nombre}</td>
                    <td>${producto.cantidad}</td>
                    <td><button class="delete-btn" onclick="eliminarProducto(${producto.id})">Eliminar</button></td>
                `;
                tbody.appendChild(fila);
            });
        }
    </script>
</body>
</html>
